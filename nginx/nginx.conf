# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name activitywatch.uz www.activitywatch.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name activitywatch.uz www.activitywatch.uz;

    ssl_certificate /etc/letsencrypt/live/activitywatch.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activitywatch.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Connection limits per IP
    limit_conn conn_limit 20;

    # Angular frontend
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Django API
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django admin
    location /admin/ {
        limit_req zone=general burst=10 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Agent download (public)
    location /download/ {
        limit_req zone=general burst=5 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
