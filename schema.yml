components:
  schemas:
    Activity:
      type: object
      description: Serializer for Activity model
      properties:
        id:
          type: integer
          readOnly: true
        session:
          type: integer
        activity_type:
          allOf:
          - $ref: '#/components/schemas/ActivityTypeEnum'
          minimum: -2147483648
          maximum: 2147483647
        window_title:
          type: string
          nullable: true
          maxLength: 500
        process_name:
          type: string
          maxLength: 200
        details:
          type: string
          nullable: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        duration:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Duration in seconds
        duration_minutes:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - duration_minutes
      - id
      - process_name
      - session
      - start_time
    ActivityTypeEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      type: integer
      description: |-
        * `0` - Window Change
        * `1` - Application Change
        * `2` - Input
        * `3` - Idle
        * `4` - Custom
    PaginatedActivityList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
    PaginatedSessionList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedActivity:
      type: object
      description: Serializer for Activity model
      properties:
        id:
          type: integer
          readOnly: true
        session:
          type: integer
        activity_type:
          allOf:
          - $ref: '#/components/schemas/ActivityTypeEnum'
          minimum: -2147483648
          maximum: 2147483647
        window_title:
          type: string
          nullable: true
          maxLength: 500
        process_name:
          type: string
          maxLength: 200
        details:
          type: string
          nullable: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        duration:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Duration in seconds
        duration_minutes:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedSession:
      type: object
      description: Serializer for Session model
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
        user_name:
          type: string
          readOnly: true
        username:
          type: string
          readOnly: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        total_duration:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Duration in seconds
        duration_hours:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedUser:
      type: object
      description: Serializer for User model
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        employee_id:
          type: string
          description: Unique employee identifier
          maxLength: 100
        full_name:
          type: string
          maxLength: 200
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        department:
          type: string
          nullable: true
          maxLength: 100
        position:
          type: string
          nullable: true
          maxLength: 100
        computer_name:
          type: string
          nullable: true
          maxLength: 100
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    RoleEnum:
      enum:
      - ADMIN
      - MANAGER
      - EMPLOYEE
      type: string
      description: |-
        * `ADMIN` - Administrator
        * `MANAGER` - Manager
        * `EMPLOYEE` - Employee
    Session:
      type: object
      description: Serializer for Session model
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
        user_name:
          type: string
          readOnly: true
        username:
          type: string
          readOnly: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        total_duration:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Duration in seconds
        duration_hours:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - duration_hours
      - id
      - start_time
      - user
      - user_name
      - username
    SessionWithActivities:
      type: object
      description: Session serializer with nested activities
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
        user_name:
          type: string
          readOnly: true
        username:
          type: string
          readOnly: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        total_duration:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Duration in seconds
        duration_hours:
          type: string
          readOnly: true
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - activities
      - created_at
      - duration_hours
      - id
      - start_time
      - user
      - user_name
      - username
    User:
      type: object
      description: Serializer for User model
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        employee_id:
          type: string
          description: Unique employee identifier
          maxLength: 100
        full_name:
          type: string
          maxLength: 200
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        department:
          type: string
          nullable: true
          maxLength: 100
        position:
          type: string
          nullable: true
          maxLength: 100
        computer_name:
          type: string
          nullable: true
          maxLength: 100
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - employee_id
      - full_name
      - id
      - updated_at
      - username
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
